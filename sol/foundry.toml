[profile.default]
src = "src"
out = "out"
libs = ["lib"]
fs_permissions = [
    { access = "read", path = "test" },
    { access = "read", path = "scripts" },
    { access = "read", path = "../test_vectors" },
]

# `forge test --fork-url sepolia|avalanche-fuji`, `cast rpc --rpc avalanche-fuji`, etc.
[rpc_endpoints]
# GhostVault.t.sol forks this in setUp (override URL in Solidity via FORK_RPC_URL).
sepolia = "${SEPOLIA_RPC_URL}"
sepolia-public = "https://ethereum-sepolia-rpc.publicnode.com"
avalanche-fuji = "https://api.avax-test.network/ext/bc/C/rpc"

# `forge script ... --verify` on Sepolia. Export `ETHERSCAN_API_KEY` (e.g. from `sol/.env`).
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
