<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844">
    <defs>
      <style>
        .vring{fill:none;stroke:#E84142;transform-origin:195px 390px}
        .vr1{stroke-width:1;animation:vring 2.4s 0s ease-out forwards}
        .vr2{stroke-width:.7;animation:vring 2.4s .2s ease-out forwards}
        .vr3{stroke-width:.4;animation:vring 2.4s .4s ease-out forwards}
        @keyframes vring{0%{r:4;stroke-opacity:.7}50%{stroke-opacity:.3}100%{r:220;stroke-opacity:0}}
        .trail{fill:#E84142;transform-origin:195px 390px}
        .t1{animation:to .7s 0s linear infinite,tf 2.4s 0s ease-in forwards}
        .t2{animation:to .7s .1s linear infinite,tf 2.4s .1s ease-in forwards}
        .t3{animation:to .7s .15s linear infinite,tf 2.4s .15s ease-in forwards}
        .t4{animation:to .7s .2s linear infinite,tf 2.4s .2s ease-in forwards}
        .t5{animation:to .7s .25s linear infinite,tf 2.4s .25s ease-in forwards}
        .t6{animation:to .9s .05s linear infinite,tf 2.4s .05s ease-in forwards}
        .t7{animation:to .9s .3s linear infinite,tf 2.4s .3s ease-in forwards}
        .t8{animation:to 1.1s 0s linear infinite,tf 2.4s 0s ease-in forwards}
        @keyframes to{to{transform:rotate(360deg)}}
        @keyframes tf{0%{fill-opacity:.55}70%{fill-opacity:.3}100%{fill-opacity:0}}
        .gbody{animation:gbp 2.4s 0s ease-in-out forwards,gbf 3s 3.1s ease-in-out infinite}
        @keyframes gbp{0%{fill-opacity:0}20%{fill-opacity:.22}80%{fill-opacity:.18}100%{fill-opacity:.13}}
        @keyframes gbf{0%,100%{fill-opacity:.13}50%{fill-opacity:.22}}
        .geyes{animation:gea .4s 2.2s ease-out both,gblink 5s 3.5s ease-in-out infinite}
        @keyframes gea{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
        @keyframes gblink{0%,84%,100%{opacity:1}88%{opacity:.08}}
        .gsmile{animation:gsa .35s 2.35s ease-out both}
        @keyframes gsa{from{stroke-opacity:0}to{stroke-opacity:.65}}
        .gfw{transform-origin:195px 390px;animation:gfl 3s 3.1s ease-in-out infinite}
        @keyframes gfl{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}
        .oring{fill:none;stroke:#E84142;stroke-dasharray:3 14;transform-origin:195px 390px}
        .or1{stroke-width:.7;animation:oa .6s 2.5s ease-out both,os 5s 2.5s linear infinite}
        .or2{stroke-width:.4;animation:oa .6s 2.6s ease-out both,osr 7s 2.6s linear infinite}
        @keyframes oa{from{opacity:0;stroke-opacity:0}to{stroke-opacity:.3}}
        @keyframes os{to{transform:rotate(360deg)}}
        @keyframes osr{to{transform:rotate(-360deg)}}
        .odot{transform-origin:195px 390px}
        .od1{animation:oa .5s 2.5s ease-out both,os 3.5s 2.5s linear infinite}
        .od2{animation:oa .5s 2.7s ease-out both,os 3.5s 2.7s linear infinite}
        .od3{animation:oa .5s 2.6s ease-out both,osr 4.5s 2.6s linear infinite}
        .wmg{animation:wmu .65s 2.5s cubic-bezier(.34,1.3,.64,1) both}
        @keyframes wmu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .grt{animation:grp 3s 3.1s ease-in-out infinite}
        @keyframes grp{0%,100%{fill:#E84142}50%{fill:#FF6465}}
        .tgl{animation:wmu .6s 2.75s ease-out both}
        .ldg{animation:wmu .4s 2.4s ease-out both}
        .verg{animation:wmu .5s 3s ease-out both}
        .sflash{animation:sfl .35s 2.35s ease-out both}
        @keyframes sfl{0%{opacity:0}30%{opacity:.12}100%{opacity:0}}
      </style>
      <radialGradient id="sg" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#E84142" stop-opacity=".16"/>
        <stop offset="100%" stop-color="#E84142" stop-opacity="0"/>
      </radialGradient>
      <clipPath id="sc"><rect width="390" height="844"/></clipPath>
    </defs>
    <rect width="390" height="844" fill="#0F0F0F"/>
    <g clip-path="url(#sc)">
      <circle cx="195" cy="390" r="200" fill="url(#sg)">
        <animate attributeName="r" values="120;200;120" dur="3s" begin="3.1s" repeatCount="indefinite"/>
        <animate attributeName="fill-opacity" values="0;1;0" dur="2.4s" begin="0s" fill="freeze"/>
        <animate attributeName="fill-opacity" values=".6;1;.6" dur="3s" begin="3.1s" repeatCount="indefinite"/>
      </circle>
      <circle class="vring vr1" cx="195" cy="390" r="4"/>
      <circle class="vring vr2" cx="195" cy="390" r="4"/>
      <circle class="vring vr3" cx="195" cy="390" r="4"/>
      <g class="trail t1"><circle cx="255" cy="390" r="3.5"/></g>
      <g class="trail t2"><circle cx="195" cy="450" r="3" transform="rotate(45 195 390)"/></g>
      <g class="trail t3"><circle cx="265" cy="390" r="2.5" transform="rotate(90 195 390)"/></g>
      <g class="trail t4"><circle cx="245" cy="390" r="3" transform="rotate(135 195 390)"/></g>
      <g class="trail t5"><circle cx="255" cy="390" r="2" transform="rotate(200 195 390)"/></g>
      <g class="trail t6"><circle cx="220" cy="330" r="2.5"/></g>
      <g class="trail t7"><circle cx="275" cy="390" r="2" transform="rotate(270 195 390)"/></g>
      <g class="trail t8"><circle cx="195" cy="320" r="2"/></g>
      <circle class="oring or1" cx="195" cy="390" r="88"/>
      <circle class="oring or2" cx="195" cy="390" r="116"/>
      <g class="odot od1"><circle cx="283" cy="390" r="3" fill="#E84142" fill-opacity=".7"/></g>
      <g class="odot od2"><circle cx="195" cy="478" r="2" fill="#E84142" fill-opacity=".5" transform="rotate(120 195 390)"/></g>
      <g class="odot od3"><circle cx="311" cy="390" r="2" fill="#E84142" fill-opacity=".45" transform="rotate(60 195 390)"/></g>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 195 390" to="1440 195 390" dur="2.4s" begin="0s" calcMode="spline" keySplines="0.2 0 0.3 1" fill="freeze"/>
        <g>
          <animateTransform attributeName="transform" type="scale" values="0;0.5;1.15;0.95;1" keyTimes="0;0.3;0.85;0.93;1" dur="2.4s" begin="0s" calcMode="spline" keySplines="0.4 0 0.6 1;0.34 1.4 0.64 1;0.4 0 0.6 1;0.4 0 0.6 1" additive="sum" fill="freeze"/>
          <g class="gfw">
            <g transform="translate(157,344)">
              <path class="gbody" d="M19 2C9.61 2 2 9.61 2 19V42L7.5 36.5L13 42L19 36.5L25 42L30.5 36.5L36 42V19C36 9.61 28.39 2 19 2Z" fill="#E84142" fill-opacity="0" stroke="#E84142" stroke-width="1.5" stroke-linejoin="round" transform="scale(2)"/>
              <path d="M38 4C19.22 4 4 19.22 4 38V84L15 73L26 84L38 73L50 84L61 73L72 84V38C72 19.22 56.78 4 38 4Z" fill="none" stroke="#E84142" stroke-width="2" stroke-linejoin="round" stroke-opacity="0">
                <animate attributeName="stroke-opacity" values="0;0.6;0.8;0.7;0.8" keyTimes="0;0.15;0.6;0.85;1" dur="2.4s" begin="0s" fill="freeze"/>
              </path>
              <g class="geyes" transform-origin="38 46"><circle cx="26" cy="38" r="5" fill="#E84142" fill-opacity=".88"/><circle cx="50" cy="38" r="5" fill="#E84142" fill-opacity=".88"/></g>
              <path class="gsmile" d="M28 50Q38 58 48 50" stroke="#E84142" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-opacity="0"/>
            </g>
          </g>
        </g>
      </g>
      <circle class="sflash" cx="195" cy="390" r="60" fill="#FFFFFF"/>
      <g class="wmg">
        <text y="540" font-family="'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="600" font-size="34" letter-spacing="-1" text-anchor="middle">
          <tspan x="195" fill="#FFFFFF">e</tspan><tspan class="grt" fill="#E84142">Ghost</tspan><tspan fill="#FFFFFF">Cash</tspan>
        </text>
      </g>
      <g class="tgl"><text x="195" y="584" font-family="'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" fill="#FFFFFF" fill-opacity=".32" text-anchor="middle" letter-spacing=".4">Send money. Leave no trace.</text></g>
      <g class="ldg">
        <rect x="135" y="636" width="120" height="2" rx="1" fill="#FFFFFF" fill-opacity=".07"/>
        <rect x="135" y="636" width="0" height="2" rx="1" fill="#E84142">
          <animate attributeName="width" from="0" to="120" dur="1s" begin="2.4s" calcMode="spline" keySplines="0.4 0 0.2 1" fill="freeze"/>
        </rect>
      </g>
      <g class="verg"><text x="195" y="674" font-family="'DM Mono','Courier New',monospace" font-size="10" fill="#FFFFFF" fill-opacity=".18" text-anchor="middle" letter-spacing="2">V1.1 · BUILT ON AVALANCHE</text></g>
    </g>
</svg>
